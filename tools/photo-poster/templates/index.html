<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photo Blog Post Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-slate-50 text-slate-900"
    data-default-tags='{{ default_tags_json|safe }}'
    data-default-category="{{ default_category }}"
  >
    <div class="max-w-6xl mx-auto p-6">
      <header class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-semibold">Photo Blog Post Creator</h1>
          <p class="text-sm text-slate-500">
            Drag, reorder, preview, then create a Hugo photo post.
          </p>
        </div>
        <div id="status" class="text-sm text-slate-600"></div>
      </header>

      <section class="mt-6 grid gap-6 lg:grid-cols-2">
        <div class="space-y-5">
          <div
            id="dropzone"
            class="rounded-lg border-2 border-dashed border-slate-300 bg-white p-6 text-center"
          >
            <p class="font-medium">Drop images here</p>
            <p class="text-sm text-slate-500">or click to browse</p>
            <input id="file-input" type="file" accept="image/*" multiple class="hidden" />
          </div>

          <div>
            <h2 class="text-sm font-semibold text-slate-600 mb-2">
              Gallery Order (first image becomes featured)
            </h2>
            <div id="thumbs" class="flex flex-wrap gap-3"></div>
          </div>

          <div class="rounded-lg border border-slate-200 bg-white p-4 space-y-3">
            <div>
              <label class="block text-sm font-medium">Title</label>
              <input
                id="title"
                type="text"
                class="mt-1 w-full rounded border border-slate-300 p-2"
                placeholder="Post title"
              />
            </div>
            <div>
              <div class="flex items-center justify-between mb-1">
                <label class="block text-sm font-medium">Description</label>
                <button
                  id="generate-desc"
                  type="button"
                  disabled
                  class="flex items-center gap-1.5 rounded bg-blue-600 px-3 py-1.5 text-sm text-white hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed transition-colors"
                >
                  <svg id="generate-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
                  </svg>
                  <svg id="generate-spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="w-4 h-4 animate-spin hidden">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  <span id="generate-btn-text">Generate</span>
                </button>
              </div>
              <textarea
                id="description"
                class="mt-1 w-full rounded border border-slate-300 p-2"
                rows="3"
                placeholder="Write a short description or click Generate"
              ></textarea>
              <div id="description-error" class="mt-2 text-sm text-red-600 hidden"></div>
            </div>
            <div>
              <label class="block text-sm font-medium">Tags (comma separated)</label>
              <input
                id="tags"
                type="text"
                class="mt-1 w-full rounded border border-slate-300 p-2"
                placeholder="photos, travel"
              />
              <div class="mt-2 flex flex-wrap gap-2 text-xs">
                <button
                  class="tag-chip rounded-full bg-slate-100 px-2 py-1 text-slate-600 hover:bg-slate-200"
                  data-tag="photos"
                >
                  photos
                </button>
                <button
                  class="tag-chip rounded-full bg-slate-100 px-2 py-1 text-slate-600 hover:bg-slate-200"
                  data-tag="travel"
                >
                  travel
                </button>
                <button
                  class="tag-chip rounded-full bg-slate-100 px-2 py-1 text-slate-600 hover:bg-slate-200"
                  data-tag="street"
                >
                  street
                </button>
                <button
                  class="tag-chip rounded-full bg-slate-100 px-2 py-1 text-slate-600 hover:bg-slate-200"
                  data-tag="nature"
                >
                  nature
                </button>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm font-medium">Category</label>
                <input
                  id="category"
                  type="text"
                  class="mt-1 w-full rounded border border-slate-300 p-2"
                />
              </div>
              <div class="flex items-center gap-2 pt-6">
                <input id="draft" type="checkbox" class="h-4 w-4" />
                <label for="draft" class="text-sm">Save as draft</label>
              </div>
            </div>
          </div>

          <div class="rounded-lg border border-slate-200 bg-white p-4">
            <h2 class="text-sm font-semibold text-slate-600 mb-2">EXIF Data</h2>
            <div class="grid grid-cols-2 gap-2 text-sm">
              <div><span class="text-slate-500">Camera:</span> <span id="exif-camera">-</span></div>
              <div><span class="text-slate-500">Focal:</span> <span id="exif-focal">-</span></div>
              <div><span class="text-slate-500">Aperture:</span> <span id="exif-aperture">-</span></div>
              <div><span class="text-slate-500">ISO:</span> <span id="exif-iso">-</span></div>
              <div class="col-span-2">
                <span class="text-slate-500">GPS:</span> <span id="exif-gps">-</span>
              </div>
            </div>
          </div>

          <div class="flex flex-wrap gap-3">
            <button
              id="create-post"
              class="rounded bg-slate-900 px-4 py-2 text-white"
              type="button"
            >
              Create Post
            </button>
            <button
              id="clear-session"
              class="rounded border border-slate-300 px-4 py-2 text-slate-700"
              type="button"
            >
              Clear Session
            </button>
          </div>
        </div>

        <div class="space-y-4">
          <div class="rounded-lg border border-slate-200 bg-white p-4">
            <h2 class="text-sm font-semibold text-slate-600 mb-2">Live Preview</h2>
            <pre
              id="preview"
              class="h-[32rem] overflow-auto whitespace-pre-wrap text-xs text-slate-800"
            ></pre>
          </div>
        </div>
      </section>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
